    <text x="1068" y="244" font-family="Anta, Arial, sans-serif" font-size="20" fill="#f2f1ea">Explore → Pilot → Integrate</text>
    <text x="1068" y="282" font-family="Anta, Arial, sans-serif" font-size="17" fill="#b8b5a8">看採用率，也看用到多深</text>
