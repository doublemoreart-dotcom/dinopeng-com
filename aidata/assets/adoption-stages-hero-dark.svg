    <g transform="translate(166 168)">
      <text x="0" y="15" font-family="Anta, Arial, sans-serif" font-size="18" fill="#b8b5a8">Technology</text>
      <rect x="150" y="-4" width="420" height="26" rx="13" fill="#2e332d"/>
      <rect x="150" y="-4" width="220" height="26" rx="13" fill="#6fac3a"/>
      <rect x="370" y="-4" width="128" height="26" fill="#e3b63d"/>
