      <rect x="150" y="-4" width="420" height="26" rx="13" fill="#2e332d"/>
      <rect x="150" y="-4" width="120" height="26" rx="13" fill="#6fac3a"/>
      <rect x="270" y="-4" width="178" height="26" fill="#e3b63d"/>
      <rect x="448" y="-4" width="122" height="26" rx="13" fill="#b88f3f"/>
      <text x="604" y="16" font-family="Anta, Arial, sans-serif" font-size="18" fill="#f2f1ea">pilot</text>
