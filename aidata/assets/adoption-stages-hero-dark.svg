      <text x="604" y="16" font-family="Anta, Arial, sans-serif" font-size="18" fill="#f2f1ea">deep</text>
    </g>
    <g transform="translate(166 218)">
      <text x="0" y="15" font-family="Anta, Arial, sans-serif" font-size="18" fill="#b8b5a8">Finance</text>
      <rect x="150" y="-4" width="420" height="26" rx="13" fill="#2e332d"/>
      <rect x="150" y="-4" width="190" height="26" rx="13" fill="#6fac3a"/>
      <rect x="340" y="-4" width="152" height="26" fill="#e3b63d"/>
      <rect x="492" y="-4" width="78" height="26" rx="13" fill="#b88f3f"/>
      <text x="604" y="16" font-family="Anta, Arial, sans-serif" font-size="18" fill="#f2f1ea">scaled</text>
    </g>
    <g transform="translate(166 268)">
