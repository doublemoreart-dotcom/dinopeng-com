<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 520" role="img" aria-labelledby="title desc">
  <title id="title">AI 產業數據觀察主視覺</title>
  <desc id="desc">抽象資料儀表板視覺，包含產業節點、泡泡圖、趨勢線與資料網格。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F8F5"/>
      <stop offset="0.42" stop-color="#EEF2EF"/>
      <stop offset="1" stop-color="#E9EEF5"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#F3F4EF" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#378ADD"/>
      <stop offset="1" stop-color="#64B6E8"/>
